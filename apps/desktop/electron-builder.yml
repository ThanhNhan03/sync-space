appId: com.syncspace.app
productName: SyncSpace
directories:
  buildResources: build
  output: release
files:
  - out/**/*
  - package.json
asarUnpack:
  - '**/*.node'
extraResources:
  - from: resources/skills
    to: skills
win:
  target: nsis
mac:
  target: dmg
  category: public.app-category.productivity
linux:
  target: AppImage
  category: Office
npmRebuild: true
